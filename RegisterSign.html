<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Marketplace - Register</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
        }

        /* LEFT SIDE IMAGE */
        .image-section {
            width: 50%;
            background: url('your-image.jpg') no-repeat center center/cover;
        }

        /* RIGHT SIDE REGISTER */
        .register-section {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .register-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .register-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
        }

        .register-box button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .register-box button:hover {
            background: #16a34a;
        }

        .register-box p {
            text-align: center;
            margin-top: 10px;
        }

        .register-box a {
            color: #3b82f6;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- IMAGE SECTION -->
    <div class="image-section"></div>

    <!-- REGISTER SECTION -->
    <div class="register-section">
        <div class="register-box">
            <h2>Sign Up</h2>

            <form action="php/register.php" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                <button type="submit">Register</button>
            </form>

            <p>Already have an account? <a href="Login.html">Login</a></p>
        </div>
    </div>

</div>

</body>
</html>
