<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Marketplace - Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
        }

        /* LEFT SIDE IMAGE */
        .image-section {
            width: 50%;
            background: url('your-image.jpg') no-repeat center center/cover;
        }

        /* RIGHT SIDE LOGIN */
        .login-section {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #1e293b;
            padding: 40px;
            border-radius: 12px;
            width: 300px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #2563eb;
        }

        .login-box p {
            text-align: center;
            margin-top: 10px;
        }

        .login-box a {
            color: #3b82f6;
            text-decoration: none;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- IMAGE SECTION -->
    <div class="image-section"></div>

    <!-- LOGIN SECTION -->
    <div class="login-section">
        <div class="login-box">
            <h2>Login</h2>

            <form action="php/login.php" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <p>Don't have an account? <a href="RegisterSign.html">Register</a></p>
        </div>
    </div>

</div>

</body>
</html>
